<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔖 Wishlist - AniBooks</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --pink:#ff6b9d; --purple:#c084fc; --blue:#60a5fa;
    --green:#34d399; --yellow:#fbbf24;
    --darker:#070710; --card:#13132a; --card2:#1a1a35;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--darker); color:#fff; font-family:'Nunito',sans-serif; overflow-x:hidden; }
  .stars{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
  .star{position:absolute;width:2px;height:2px;background:white;border-radius:50%;animation:twinkle 3s infinite;}
  @keyframes twinkle{0%,100%{opacity:0.2;}50%{opacity:1;}}

  nav {
    position:sticky; top:0; z-index:100;
    padding:1rem 2rem; display:flex; justify-content:space-between; align-items:center;
    background:#070710ee; backdrop-filter:blur(10px); border-bottom:1px solid #ffffff11;
  }
  .logo{font-family:'Cinzel Decorative',serif;font-size:1.2rem;
    background:linear-gradient(135deg,var(--pink),var(--purple));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .nav-back{color:#aaa;text-decoration:none;font-weight:600;transition:color 0.3s;}
  .nav-back:hover{color:var(--pink);}

  .main{position:relative;z-index:2;padding:2rem;max-width:1100px;margin:0 auto;}

  .page-header{text-align:center;margin-bottom:2.5rem;animation:fadeIn 0.6s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-15px)}to{opacity:1;transform:translateY(0)}}
  .page-header h1{font-family:'Cinzel Decorative',serif;font-size:clamp(1.5rem,4vw,2.5rem);
    background:linear-gradient(135deg,var(--pink),var(--purple));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:0.3rem;}
  .page-header p{color:#888;}

  /* TABS */
  .tabs{display:flex;gap:0.5rem;margin-bottom:2rem;background:var(--card);
    padding:4px;border-radius:12px;width:fit-content;margin:0 auto 2rem;}
  .tab{padding:0.6rem 1.5rem;border-radius:9px;cursor:pointer;
    font-weight:700;color:#888;transition:all 0.3s;}
  .tab.active{background:linear-gradient(135deg,var(--pink),var(--purple));color:white;}

  /* GRID */
  .books-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1.2rem;}

  .book-card{
    background:var(--card);border-radius:16px;overflow:hidden;
    border:1px solid #ffffff11;transition:all 0.3s;
    animation:fadeIn 0.4s ease both;
  }
  .book-card:hover{transform:translateY(-6px);border-color:var(--pink);box-shadow:0 0 20px #ff6b9d33;}
  .book-cover{
    height:160px;display:flex;align-items:center;justify-content:center;
    font-size:3.5rem;position:relative;
  }
  .cover-1{background:linear-gradient(135deg,#1a1a2e,#16213e);}
  .cover-2{background:linear-gradient(135deg,#2d1b69,#11998e);}
  .cover-3{background:linear-gradient(135deg,#3d0c02,#c31432);}
  .cover-4{background:linear-gradient(135deg,#0f3443,#34e89e);}
  .cover-5{background:linear-gradient(135deg,#360033,#0b8793);}
  .cover-6{background:linear-gradient(135deg,#1a1a1a,#4a0e0e);}

  .bookmark-btn{
    position:absolute;top:8px;right:8px;
    background:#00000066;border:none;color:var(--yellow);
    font-size:1.2rem;cursor:pointer;padding:0.3rem;
    border-radius:8px;transition:all 0.2s;
  }
  .bookmark-btn:hover{transform:scale(1.2);}
  .bookmark-btn.saved{color:var(--yellow);filter:drop-shadow(0 0 5px var(--yellow));}

  .book-info{padding:1rem;}
  .book-info h3{font-size:0.95rem;margin-bottom:0.2rem;}
  .book-info .author{color:#888;font-size:0.8rem;margin-bottom:0.5rem;}
  .book-info .price{font-weight:800;margin-bottom:0.8rem;}
  .price.paid{color:var(--green);}
  .price.free{color:var(--blue);}

  .card-btns{display:flex;gap:0.5rem;}
  .btn-buy{
    flex:1;padding:0.5rem;border-radius:8px;border:none;
    background:linear-gradient(135deg,var(--pink),var(--purple));
    color:white;font-family:'Nunito',sans-serif;font-weight:700;
    font-size:0.85rem;cursor:pointer;transition:transform 0.2s;
  }
  .btn-buy:hover{transform:scale(1.02);}
  .btn-remove{
    padding:0.5rem 0.7rem;border-radius:8px;
    border:1px solid #ffffff22;background:transparent;
    color:#888;cursor:pointer;transition:all 0.2s;font-size:0.85rem;
  }
  .btn-remove:hover{border-color:#f87171;color:#f87171;}

  /* EMPTY STATE */
  .empty-state{
    text-align:center;padding:4rem 2rem;
    display:none;
  }
  .empty-state .empty-icon{font-size:5rem;display:block;margin-bottom:1rem;
    animation:bounce 2s ease-in-out infinite;}
  @keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-15px);}}
  .empty-state h2{color:#555;margin-bottom:0.5rem;}
  .empty-state p{color:#444;}
  .empty-state a{
    display:inline-block;margin-top:1.5rem;padding:0.8rem 2rem;
    background:linear-gradient(135deg,var(--pink),var(--purple));
    border-radius:50px;color:white;font-weight:700;text-decoration:none;
  }

  /* TOAST */
  .toast{
    position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);
    background:var(--card);border:1px solid var(--green);
    color:var(--green);padding:0.8rem 2rem;border-radius:50px;
    font-weight:700;z-index:9999;transition:transform 0.3s;
    box-shadow:0 0 20px #34d39933;
  }
  .toast.show{transform:translateX(-50%) translateY(0);}

  .count-badge{
    background:var(--pink);color:white;border-radius:50%;
    width:22px;height:22px;display:inline-flex;align-items:center;
    justify-content:center;font-size:0.75rem;font-weight:800;
    margin-left:0.3rem;
  }
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<nav>
  <div class="logo">📚 AniBooks</div>
  <a href="home.html" class="nav-back">← Home</a>
</nav>

<div class="main">
  <div class="page-header">
    <h1>🔖 Meri Wishlist</h1>
    <p>Saved books jo baad mein padni hain</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="filterWishlist('all',this)">Sab <span class="count-badge" id="allCount">6</span></div>
    <div class="tab" onclick="filterWishlist('paid',this)">💰 Paid</div>
    <div class="tab" onclick="filterWishlist('free',this)">🆓 Free</div>
  </div>

  <div class="books-grid" id="booksGrid"></div>
  <div class="empty-state" id="emptyState">
    <span class="empty-icon">🔖</span>
    <h2>Wishlist Khaali Hai!</h2>
    <p>Koi book save nahi ki abhi tak</p>
    <a href="home.html">📚 Books Dekho</a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const starsEl=document.getElementById('stars');
for(let i=0;i<80;i++){const s=document.createElement('div');s.className='star';
  s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';
  s.style.animationDelay=Math.random()*3+'s';starsEl.appendChild(s);}

const books = [
  {id:1,title:'Meri Pehli Kahani',author:'Rahul Kumar',emoji:'🌸',cover:'cover-1',price:99,type:'paid'},
  {id:2,title:'Pride & Prejudice',author:'Jane Austen',emoji:'🌙',cover:'cover-2',price:0,type:'free'},
  {id:3,title:'Tech Ki Duniya',author:'Amit Singh',emoji:'⚡',cover:'cover-3',price:149,type:'paid'},
  {id:4,title:'Godan',author:'Premchand',emoji:'📜',cover:'cover-4',price:0,type:'free'},
  {id:5,title:'Sapnon Ki Shayari',author:'Priya Verma',emoji:'💫',cover:'cover-5',price:49,type:'paid'},
  {id:6,title:'Sherlock Holmes',author:'A.C. Doyle',emoji:'🔍',cover:'cover-6',price:0,type:'free'},
];

let wishlist = [1,2,3,4,5,6];

function renderBooks(filter='all') {
  const grid = document.getElementById('booksGrid');
  const empty = document.getElementById('emptyState');
  const filtered = books.filter(b => wishlist.includes(b.id) && (filter==='all' || b.type===filter));

  if(filtered.length === 0) {
    grid.innerHTML=''; empty.style.display='block'; return;
  }
  empty.style.display='none';
  grid.innerHTML = filtered.map((b,i) => `
    <div class="book-card" style="animation-delay:${i*0.08}s" id="card-${b.id}">
      <div class="book-cover ${b.cover}">
        ${b.emoji}
        <button class="bookmark-btn saved" onclick="removeBook(${b.id})">🔖</button>
      </div>
      <div class="book-info">
        <h3>${b.title}</h3>
        <div class="author">✍️ ${b.author}</div>
        <div class="price ${b.type}">${b.type==='free' ? '🆓 Free' : '₹'+b.price}</div>
        <div class="card-btns">
          <button class="btn-buy">${b.type==='free' ? '📥 Download' : '🛒 Buy'}</button>
          <button class="btn-remove" onclick="removeBook(${b.id})">🗑️</button>
        </div>
      </div>
    </div>`).join('');
  document.getElementById('allCount').textContent = wishlist.length;
}

function removeBook(id) {
  wishlist = wishlist.filter(w => w !== id);
  renderBooks();
  showToast('🗑️ Wishlist se hata diya!');
}

function filterWishlist(filter, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderBooks(filter);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

renderBooks();
</script>
</body>
</html>
