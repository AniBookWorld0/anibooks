<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AniBooks</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
#intro { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.bg-scene { position: absolute; inset: 0; background: linear-gradient(180deg, #c8e8f8 0%, #a0d4ea 25%, #d0eec0 65%, #b8e8a0 100%); }

/* SAKURA PETALS */
.petal { position: absolute; border-radius: 50% 0 50% 0; opacity: 0; animation: petalFall linear infinite; pointer-events: none; }
@keyframes petalFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:0;} 10%{opacity:0.9;} 90%{opacity:0.5;} 100%{transform:translateY(110vh) rotate(720deg);opacity:0;} }

/* LIGHT RAYS */
.ray { position: absolute; top: -10%; width: 3px; height: 120%; background: linear-gradient(to bottom, #ffffff55, transparent); transform-origin: top center; opacity: 0; pointer-events: none; animation: rayAnim 3s ease-in-out infinite alternate; }
@keyframes rayAnim { 0%{opacity:0.15;} 100%{opacity:0.55;} }

/* SPARKLES */
.sparkle { position: absolute; background: #fff; clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%); animation: sparkleTwinkle 1.5s ease-in-out infinite; pointer-events: none; }
@keyframes sparkleTwinkle { 0%,100%{transform:scale(0.4) rotate(0deg);opacity:0.2;} 50%{transform:scale(1.3) rotate(180deg);opacity:1;} }

.scanlines { position: absolute; inset: 0; z-index: 3; pointer-events: none; background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, #00000011 3px, #00000011 4px); opacity: 0.2; }
.flash { position: absolute; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 60; }

/* RINGS - soft green */
.energy-ring { position: absolute; border-radius: 50%; border: 2px solid #88ddaa; transform: translate(-50%,-50%) scale(0); opacity: 0; left: 50%; top: 50%; box-shadow: 0 0 10px #88ddaa; }

/* CHARACTER */
#charContainer { position: relative; z-index: 20; opacity: 0; transform: translateY(60px) scale(0.75); transition: opacity 0.9s ease, transform 1.1s cubic-bezier(0.34,1.3,0.64,1); display: flex; flex-direction: column; align-items: center; }
.char-img-wrap { position: relative; width: 270px; }

/* Green glow border */
.char-img-wrap::before { content: ''; position: absolute; inset: -5px; border-radius: 18px; background: linear-gradient(135deg, #a8e8c0, #c8f8d8, #88ddaa, #b0f0c8); z-index: 1; animation: borderGlow 1.5s ease-in-out infinite alternate; filter: blur(2px); }
@keyframes borderGlow { 0%{opacity:0.4;box-shadow:0 0 15px #88ddaa44;} 100%{opacity:0.95;box-shadow:0 0 40px #88ddaaaa,0 0 70px #b0f0c855;} }

.char-img { width: 270px; border-radius: 14px; display: block; position: relative; z-index: 2; filter: brightness(1.05) contrast(1.1) saturate(1.1); box-shadow: 0 20px 60px #00000044; }

/* Bottom shadow glow */
.char-glow { position: absolute; bottom: -15px; left: 50%; transform: translateX(-50%); width: 220px; height: 60px; background: radial-gradient(ellipse, #88ddaa66 0%, transparent 70%); filter: blur(12px); z-index: 0; animation: glowPulse 1.5s ease-in-out infinite alternate; }
@keyframes glowPulse { 0%{opacity:0.5;transform:translateX(-50%) scaleX(0.9);} 100%{opacity:1;transform:translateX(-50%) scaleX(1.1);} }

/* POWER TEXT */
.power-level { text-align: center; margin-top: 14px; font-family: 'Georgia', serif; font-size: 0.78rem; letter-spacing: 3px; color: #1a5c38; text-shadow: 0 0 8px #88ddaa88, 0 1px 3px #fff; opacity: 0; transition: opacity 0.6s; white-space: nowrap; font-weight: bold; }

/* FLOATING ICONS */
.float-icon { position: absolute; font-size: 1.5rem; opacity: 0; pointer-events: none; z-index: 25; }
@keyframes floatUp { 0%{transform:translateY(0) rotate(-8deg);opacity:0;} 15%{opacity:1;} 85%{opacity:0.8;} 100%{transform:translateY(-90px) rotate(12deg);opacity:0;} }

/* TITLE */
#titleReveal { position: absolute; bottom: 9%; left: 50%; transform: translateX(-50%); text-align: center; opacity: 0; z-index: 30; white-space: nowrap; transition: opacity 0.9s ease; }
#titleReveal h1 { font-family: 'Georgia', serif; font-size: clamp(2rem,6vw,4rem); font-weight: 900; letter-spacing: 8px; background: linear-gradient(135deg, #1a5c38, #2d9e6b, #1a5c38); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 2px 8px #88ddaa88); text-transform: uppercase; }
#titleReveal p { color: #2d6a4f99; letter-spacing: 3px; font-size: clamp(0.6rem,1.5vw,0.82rem); margin-top: 0.4rem; font-family: 'Arial', sans-serif; }

/* ENTER BTN */
#enterBtn { position: absolute; bottom: 3.5%; left: 50%; transform: translateX(-50%); padding: 0.85rem 3rem; background: linear-gradient(135deg, #2d9e6b, #1a7a50); border: none; border-radius: 50px; color: white; font-size: 0.9rem; font-weight: 900; letter-spacing: 4px; cursor: pointer; opacity: 0; z-index: 30; text-transform: uppercase; font-family: 'Georgia', serif; box-shadow: 0 0 25px #88ddaa55; transition: transform 0.2s, box-shadow 0.2s; }
#enterBtn:hover { transform: translateX(-50%) scale(1.06); box-shadow: 0 0 50px #88ddaaaa; }

#skipBtn { position: absolute; top: 1.2rem; right: 1.2rem; padding: 0.35rem 1rem; background: #ffffff44; border: 1px solid #88ddaa88; border-radius: 20px; color: #1a5c38; font-size: 0.75rem; cursor: pointer; z-index: 30; opacity: 0; transition: all 0.3s; }
#skipBtn:hover { background: #ffffff77; }

#intro.exit { animation: introExit 0.7s ease forwards; }
@keyframes introExit { 0%{opacity:1;} 60%{opacity:1;transform:scale(1.02);} 100%{opacity:0;transform:scale(1.08);} }

/* MAIN SITE */
#mainSite { display: none; opacity: 0; transition: opacity 0.8s ease; background: #070710; min-height: 100vh; }
#mainSite.visible { opacity: 1; }
:root { --pink: #ff6b9d; --purple: #c084fc; --blue: #60a5fa; }
.stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
.star { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; animation: twinkle 3s infinite; }
@keyframes twinkle { 0%,100%{opacity:0.2;} 50%{opacity:1;} }
.s-nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: #070710ee; backdrop-filter: blur(10px); border-bottom: 1px solid #ffffff11; position: relative; z-index: 2; }
.s-logo { font-size: 1.4rem; font-weight: 900; background: linear-gradient(135deg, var(--pink), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.s-links { display: flex; gap: 0.8rem; flex-wrap: wrap; }
.s-links a { color: #aaa; text-decoration: none; font-weight: 600; font-size: 0.82rem; transition: color 0.3s; }
.s-links a:hover { color: var(--pink); }
.s-hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem; position: relative; z-index: 2; }
.s-hero-bg { position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 50%,#c084fc22 0%,transparent 70%), radial-gradient(ellipse at 20% 80%,#ff6b9d22 0%,transparent 50%); }
.s-hero-c { position: relative; z-index: 2; animation: heroIn 0.8s ease 0.2s both; }
@keyframes heroIn { from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)} }
.s-hero-c h1 { font-size: clamp(2.5rem,7vw,5rem); font-weight: 900; background: linear-gradient(135deg,#fff,var(--pink),var(--purple),var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem; line-height: 1.1; }
.s-hero-c p { color: #aaa; font-size: 1.1rem; margin-bottom: 2rem; }
.s-hero-c .emoji { font-size: 5rem; display: block; margin-bottom: 1rem; animation: bounce2 2s ease-in-out infinite; }
@keyframes bounce2{0%,100%{transform:translateY(0);}50%{transform:translateY(-15px);}}
.s-btn { display: inline-block; padding: 0.8rem 2rem; border-radius: 50px; font-weight: 800; cursor: pointer; transition: all 0.3s; text-decoration: none; margin: 0.4rem; font-size: 0.95rem; }
.s-btn-p { background: linear-gradient(135deg,var(--pink),var(--purple)); color: white; border: none; }
.s-btn-p:hover { transform: translateY(-3px); box-shadow: 0 0 25px #ff6b9d88; }
.s-btn-o { background: transparent; border: 2px solid var(--purple); color: var(--purple); }
.s-btn-o:hover { background: var(--purple); color: white; transform: translateY(-3px); }
</style>
</head>

}

const charEl=document.getElementById('charContainer');
const flashEl=document.getElementById('flash');
const powerEl=document.getElementById('powerLevel');
const titleEl=document.getElementById('titleReveal');
const enterEl=document.getElementById('enterBtn');
const skipEl=document.getElementById('skipBtn');
const allRings=document.querySelectorAll('.energy-ring');
const floatIcons=document.querySelectorAll('.float-icon');

function doFlash(op=0.5,dur=250){
  flashEl.style.transition=`opacity ${dur*0.3}ms`;
  flashEl.style.opacity=op;
  setTimeout(()=>{flashEl.style.transition=`opacity ${dur*0.7}ms`;flashEl.style.opacity='0';},dur*0.35);
}
function expandRings(){
  allRings.forEach((r,i)=>setTimeout(()=>{
    r.style.transition='transform 1s ease, opacity 1s ease';
    r.style.transform='translate(-50%,-50%) scale(4)';
    r.style.opacity='0';
  },i*80));
}

// SEQUENCE
setTimeout(()=>{charEl.style.opacity='1';charEl.style.transform='translateY(0) scale(1)';},500);
setTimeout(()=>{
  floatIcons.forEach((f,i)=>{
    setTimeout(()=>{f.style.animation=`floatUp ${2.5+Math.random()}s ease-in-out ${i*0.5}s infinite`;},i*150);
  });
},1500);
setTimeout(()=>powerEl.style.opacity='1',2200);
setTimeout(()=>{skipEl.style.transition='opacity 0.5s';skipEl.style.opacity='1';},2000);
setTimeout(()=>{charEl.style.filter='drop-shadow(0 0 20px #88ddaaaa) drop-shadow(0 0 40px #b0f0c855)';},3000);
setTimeout(()=>{doFlash(0.45,300);expandRings();},3900);
setTimeout(()=>titleEl.style.opacity='1',4600);
setTimeout(()=>{
  enterEl.style.transition='opacity 0.5s';
  enterEl.style.opacity='1';
  enterEl.style.animation='btnPulse 1.8s ease-in-out infinite';
},5600);
setTimeout(enterSite,10500);

const st=document.createElement('style');
st.textContent='@keyframes btnPulse{0%,100%{box-shadow:0 0 20px #88ddaa44;}50%{box-shadow:0 0 50px #88ddaaaa,0 0 80px #b0f0c855;}}';
document.head.appendChild(st);

function enterSite(){
  const intro=document.getElementById('intro');
  if(intro.style.display==='none') return;
  intro.classList.add('exit');
  setTimeout(()=>{
    intro.style.display='none';
    const m=document.getElementById('mainSite');
    m.style.display='block'; initStars();
    setTimeout(()=>m.classList.add('visible'),50);
  },650);
}
function initStars(){
  const c=document.getElementById('stars');
  for(let i=0;i<120;i++){
    const s=document.createElement('div');s.className='star';
    s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';
    s.style.animationDelay=Math.random()*3+'s';c.appendChild(s);
  }
}
</script>
</body>
</html>
